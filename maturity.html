<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>好友成熟时间</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f6f8fb;color:#111827}.page{max-width:1180px;margin:0 auto;padding:20px}.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap;margin-bottom:16px}h1{margin:0;font-size:26px;color:#166534}p{margin:6px 0;color:#4b5563}.btn{border:1px solid #d1d5db;background:white;border-radius:8px;padding:8px 12px;font-weight:700;cursor:pointer;text-decoration:none;color:#374151;display:inline-flex;align-items:center;gap:4px}.btn.primary{background:#16a34a;color:white;border-color:#16a34a}.btn.warn{background:#f59e0b;color:white;border-color:#f59e0b}.btn.blue{background:#2563eb;color:white;border-color:#2563eb}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}.card{background:white;border-radius:16px;padding:14px;box-shadow:0 4px 14px rgba(15,23,42,.06)}.label{font-size:12px;color:#6b7280}.value{font-size:20px;font-weight:900;margin-top:4px}.panel{background:white;border-radius:18px;box-shadow:0 4px 14px rgba(15,23,42,.06);overflow:hidden;margin-bottom:16px}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border-bottom:1px solid #eef2f7}.panel-title{font-size:16px;font-weight:900}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:10px 12px;border-bottom:1px solid #eef2f7;text-align:left;white-space:nowrap}th{background:#f8fafc;color:#475569;font-size:12px}.mutant{color:#d97706;font-weight:800}.ready{color:#dc2626;font-weight:900}.ok{color:#16a34a;font-weight:800}.dim{color:#6b7280}.selected{background:#f0fdf4}.land-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px;padding:16px}.land{min-height:96px;border:1px solid #e5e7eb;border-radius:12px;padding:8px;background:#f9fafb;position:relative}.land.ready{background:#fef2f2;border-color:#fecaca}.land.soon{background:#fffbeb;border-color:#fde68a}.land .no{position:absolute;right:8px;top:6px;font-size:11px;color:#94a3b8}.land .name{font-size:12px;font-weight:900;margin-top:8px;white-space:normal}.land .time{font-size:11px;color:#475569;margin-top:6px;line-height:1.35}.log{max-height:220px;overflow:auto;padding:12px 16px;font-family:ui-monospace,Consolas,monospace;font-size:12px;background:#0f172a;color:#d1fae5}.pill{display:inline-flex;padding:2px 8px;border-radius:999px;font-size:12px;background:#eef2ff;color:#3730a3;font-weight:800}.nav-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}@media(max-width:800px){.grid{grid-template-columns:repeat(2,1fr)}.land-grid{grid-template-columns:repeat(3,1fr)}}
  </style>
</head>
<body>
  <main class="page">
    <div class="top">
      <div>
        <h1>好友成熟时间</h1>
        <p>基于 farm-parse 抓包事件写入 SQLite；GID 是主键，名称仅展示。自动化只下发视觉点击命令，不发送游戏协议请求。</p>
      </div>
      <div class="nav-actions">
        <button class="btn" onclick="openHome()">🏠 主页</button>
        <button class="btn" onclick="openProxy()">📡 抓包解析</button>
        <button class="btn" onclick="refreshAll()">刷新</button>
        <button class="btn primary" id="schedulerBtn" onclick="toggleScheduler()">调度状态</button>
      </div>
    </div>

    <section class="grid">
      <div class="card"><div class="label">事件流</div><div class="value" id="streamState">--</div></div>
      <div class="card"><div class="label">好友数</div><div class="value" id="friendCount">0</div></div>
      <div class="card"><div class="label">活跃任务</div><div class="value" id="taskCount">0</div></div>
      <div class="card"><div class="label">最近好友</div><div class="value" id="lastFriend" style="font-size:14px">--</div></div>
    </section>

    <section class="panel" id="tasks">
      <div class="panel-head"><div class="panel-title">即将成熟 / 待摘取任务</div><span class="pill" id="taskHint">--</span></div>
      <div class="table-wrap"><table><thead><tr><th>状态</th><th>好友</th><th>GID</th><th>土地</th><th>作物</th><th>成熟时间</th><th>倒计时</th><th>操作</th></tr></thead><tbody id="tasksBody"></tbody></table></div>
    </section>

    <section class="panel">
      <div class="panel-head"><div class="panel-title">好友列表</div><span class="pill">点击好友查看土地</span></div>
      <div class="table-wrap"><table><thead><tr><th>好友</th><th>GID</th><th>土地</th><th>作物</th><th>可摘</th><th>已成熟</th><th>下次成熟</th><th>倒计时</th><th>最近抓包</th></tr></thead><tbody id="friendsBody"></tbody></table></div>
    </section>

    <section class="panel" id="landsPanel" style="display:none">
      <div class="panel-head"><div class="panel-title" id="landsTitle">土地</div><span class="pill" id="profileHint">未记录点击位置</span></div>
      <div class="land-grid" id="landsGrid"></div>
    </section>

    <section class="panel">
      <div class="panel-head"><div class="panel-title">自动化日志</div><button class="btn" onclick="loadLogs()">刷新日志</button></div>
      <div class="log" id="logs">--</div>
    </section>
  </main>

  <script>
    let selectedGid = null;
    let schedulerEnabled = true;

    function parseBase() {
      const protocol = location.protocol === 'https:' ? 'https:' : 'http:';
      return `${protocol}//${location.hostname}:8787`;
    }
    function openHome() { location.href = `${parseBase()}/`; }
    function openProxy() { location.href = `${parseBase()}/proxy.html`; }

    function fmtTime(ms) {
      if (!ms) return '-';
      return new Date(Number(ms)).toLocaleString();
    }
    function fmtAge(ms) {
      if (!ms) return '-';
      const sec = Math.floor((Date.now() - Number(ms)) / 1000);
      if (sec < 60) return sec + '秒前';
      const min = Math.floor(sec / 60);
      if (min < 60) return min + '分钟前';
      const h = Math.floor(min / 60);
      return h + '小时前';
    }
    function fmtCountdown(ms) {
      if (!ms) return '-';
      let diff = Number(ms) - Date.now();
      const past = diff < 0;
      diff = Math.abs(diff);
      const sec = Math.floor(diff / 1000);
      const d = Math.floor(sec / 86400);
      const h = Math.floor((sec % 86400) / 3600);
      const m = Math.floor((sec % 3600) / 60);
      const s = sec % 60;
      let text = d ? `${d}天${h}小时` : h ? `${h}小时${m}分` : m ? `${m}分${s}秒` : `${s}秒`;
      return past ? '已过 ' + text : text;
    }
    function esc(v) { return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

    async function api(url, options) {
      const res = await fetch(url, options);
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    async function loadStatus() {
      const s = await api('/api/maturity/status');
      schedulerEnabled = !!s.scheduler?.enabled;
      document.getElementById('streamState').textContent = s.streamConnected ? '已连接' : '未连接';
      document.getElementById('streamState').className = s.streamConnected ? 'value ok' : 'value ready';
      document.getElementById('lastFriend').textContent = s.lastPersistedFriend ? `${s.lastPersistedFriend.name} (${s.lastPersistedFriend.gid})` : '--';
      document.getElementById('schedulerBtn').textContent = schedulerEnabled ? '关闭调度' : '开启调度';
      document.getElementById('schedulerBtn').className = schedulerEnabled ? 'btn warn' : 'btn primary';
    }

    async function toggleScheduler() {
      await api('/api/maturity/scheduler/toggle', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ enabled: !schedulerEnabled }) });
      await loadStatus();
    }

    async function loadFriends() {
      const friends = await api('/api/maturity/friends');
      document.getElementById('friendCount').textContent = friends.length;
      const body = document.getElementById('friendsBody');
      body.innerHTML = friends.map(f => {
        const next = Number(f.next_mature_at || 0);
        return `<tr class="${selectedGid === String(f.gid) ? 'selected' : ''}" onclick="selectFriend('${esc(f.gid)}')">
          <td><b>${esc(f.name || '未知')}</b></td><td class="dim">${esc(f.gid)}</td><td>${f.land_total || 0}</td><td>${f.plant_total || 0}</td>
          <td class="ready">${f.stealable_total || 0}</td><td>${f.mature_total || 0}</td><td>${fmtTime(next)}</td><td>${fmtCountdown(next)}</td><td>${fmtAge(f.last_seen_at)}</td>
        </tr>`;
      }).join('') || '<tr><td colspan="9" class="dim">等待抓包数据...</td></tr>';
    }

    async function loadTasks() {
      const tasks = await api('/api/maturity/tasks?status=active&limit=100');
      document.getElementById('taskCount').textContent = tasks.length;
      document.getElementById('taskHint').textContent = tasks[0] ? `最近：${fmtCountdown(tasks[0].mature_at)}` : '暂无任务';
      document.getElementById('tasksBody').innerHTML = tasks.map(t => `<tr>
        <td><span class="pill">${esc(t.status)}</span></td><td><b>${esc(t.friend_name || '未知')}</b></td><td class="dim">${esc(t.friend_gid)}</td>
        <td>#${t.land_id}</td><td>${esc(t.plant_name || t.plant_id)}</td><td>${fmtTime(t.mature_at)}</td><td class="${Number(t.mature_at) <= Date.now() ? 'ready' : ''}">${fmtCountdown(t.mature_at)}</td>
        <td><button class="btn" onclick="markTask(${t.id}, 'harvested')">标记已摘</button> <button class="btn" onclick="markTask(${t.id}, 'skipped')">跳过</button></td>
      </tr>`).join('') || '<tr><td colspan="8" class="dim">暂无活跃任务</td></tr>';
    }

    async function markTask(id, status) {
      await api(`/api/maturity/tasks/${id}/mark`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ status, message:'manual mark from dashboard' }) });
      await refreshAll();
    }

    async function selectFriend(gid) {
      selectedGid = String(gid);
      const data = await api(`/api/maturity/friends/${encodeURIComponent(gid)}`);
      document.getElementById('landsPanel').style.display = 'block';
      document.getElementById('landsTitle').textContent = `${data.friend.name || '未知'} (${data.friend.gid}) 的土地`;
      document.getElementById('profileHint').textContent = data.profile && Object.keys(data.profile).length ? '已记录点击位置' : '未记录点击位置';
      const lands = data.lands || [];
      document.getElementById('landsGrid').innerHTML = lands.map(l => {
        const cls = Number(l.mature_at) <= Date.now() && Number(l.mature_at) > 0 ? 'land ready' : Number(l.mature_at) - Date.now() < 10 * 60 * 1000 ? 'land soon' : 'land';
        return `<div class="${cls}"><div class="no">#${l.land_id}</div><div class="name">${esc(l.has_plant ? l.plant_name : '空地')}</div>
          <div class="time">阶段：${esc(l.phase_name || l.phase)}<br>成熟：${fmtTime(l.mature_at)}<br>倒计时：${fmtCountdown(l.mature_at)}<br>可摘：${l.stealable ? '是' : '否'} ${l.mutant_summary ? '<br><span class="mutant">变异：'+esc(l.mutant_summary)+'</span>' : ''}</div></div>`;
      }).join('') || '<div class="dim">暂无土地数据</div>';
      await loadFriends();
    }

    async function loadLogs() {
      const logs = await api('/api/maturity/logs?limit=80');
      document.getElementById('logs').innerHTML = logs.map(l => `[${new Date(Number(l.created_at)).toLocaleTimeString()}] ${esc(l.level)} ${esc(l.message)}`).join('<br>') || '--';
    }

    async function refreshAll() {
      await Promise.all([loadStatus(), loadFriends(), loadTasks(), loadLogs()]);
      if (selectedGid) selectFriend(selectedGid).catch(()=>{});
    }

    refreshAll().catch(err => alert(err.message));
    setInterval(refreshAll, 5000);
  </script>
</body>
</html>
