<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>好友成熟时间</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#eef9f0,#d6f0e2);color:#111827}.page{max-width:1200px;margin:0 auto;padding:18px 14px 28px}.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap;margin-bottom:16px}h1{margin:0;font-size:26px;color:#166534}p{margin:6px 0;color:#15803d;font-size:13px}.btn{border:1px solid #d1d5db;background:white;border-radius:999px;padding:8px 13px;font-weight:800;cursor:pointer;text-decoration:none;color:#374151;display:inline-flex;align-items:center;gap:4px;box-shadow:0 1px 3px rgba(15,23,42,.04)}.btn.primary{background:#16a34a;color:white;border-color:#16a34a}.btn.warn{background:#f59e0b;color:white;border-color:#f59e0b}.btn.blue{background:#2563eb;color:white;border-color:#2563eb}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}.card,.search-box,.panel{background:#ffffffdd;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.85);border-radius:22px;padding:14px;box-shadow:0 8px 22px rgba(15,23,42,.07)}.label{font-size:12px;color:#64748b}.value{font-size:20px;font-weight:950;margin-top:4px;color:#0f172a}.panel{overflow:hidden;margin-bottom:16px;padding:0}.panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border-bottom:1px solid #eef2f7}.panel-title{font-size:16px;font-weight:900}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:10px 12px;border-bottom:1px solid #eef2f7;text-align:left;white-space:nowrap}th{background:#f8fafc;color:#475569;font-size:12px}.ready{color:#dc2626;font-weight:900}.ok{color:#16a34a;font-weight:800}.dim{color:#6b7280}.mutant{color:#d97706;font-weight:800}.pill{display:inline-flex;padding:2px 8px;border-radius:999px;font-size:12px;background:#eef2ff;color:#3730a3;font-weight:800}.nav-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}.search-grid{display:grid;grid-template-columns:1.08fr .92fr;gap:12px;margin-bottom:16px}.search-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.search-row input{flex:1;min-width:180px;border:1px solid #d1d5db;border-radius:14px;padding:10px 12px;font-size:14px;background:#fff}.search-box h3{margin:0 0 10px;color:#166534;font-size:16px}.hidden-compat{display:none!important}.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center}.modal-content{background:#fff;border-radius:18px;width:90%;max-width:900px;max-height:85vh;overflow:hidden;box-shadow:0 25px 50px -12px rgba(0,0,0,.25);display:flex;flex-direction:column}.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid #eef2f7}.modal-header h2{margin:0;font-size:18px}.modal-close{background:none;border:none;font-size:20px;color:#6b7280;cursor:pointer;padding:4px 8px}.modal-body{flex:1;overflow-y:auto;padding:16px}.modal-footer{padding:12px 16px;border-top:1px solid #eef2f7;text-align:right}.modal-footer .btn{margin-left:8px}@media(max-width:900px){.search-grid{grid-template-columns:1fr}}@media(max-width:760px){.grid{grid-template-columns:1fr}.page{padding:14px 10px 24px}}
  </style>
</head>
<body>
  <main class="page">
    <div class="top"><div><h1>好友成熟时间</h1><p>GID 是主键，名称仅展示。成熟可摘 = 已成熟 + 协议允许 + 剩余数量超过总数 70%。</p></div><div class="nav-actions"><button class="btn" onclick="openHome()">🏠 主页</button><button class="btn" onclick="openProxy()">📡 抓包解析</button><button class="btn" onclick="refreshAll()">刷新</button><button class="btn primary" id="schedulerBtn" onclick="toggleScheduler()">调度状态</button></div></div>
    <section class="grid"><div class="card"><div class="label">事件流</div><div class="value" id="streamState">--</div></div><div class="card"><div class="label">好友数</div><div class="value" id="friendCount">0</div></div><div class="card"><div class="label">最近好友</div><div class="value" id="lastFriend" style="font-size:14px">--</div></div><div class="card hidden-compat"><div class="label">兼容任务计数</div><div class="value" id="taskCount">0</div></div></section>

    <section class="search-grid">
      <div class="search-box">
        <h3>好友名称模糊搜索</h3>
        <div class="search-row"><input id="friendNameSearch" placeholder="输入好友名称"><button class="btn" onclick="document.getElementById('friendNameSearch').value='';applyFriendNameSearch();">清空</button></div>
        <p class="dim" id="friendNameSearchHint">等待数据...</p>
        <div class="table-wrap"><table><thead><tr><th>好友</th><th>GID</th><th>作物</th><th>成熟可摘</th><th>最近成熟</th><th>倒计时</th><th>最近抓包</th></tr></thead><tbody id="friendNameSearchBody"><tr><td colspan="7" class="dim">等待数据...</td></tr></tbody></table></div>
      </div>
      <div class="search-box">
        <h3>农作物名称搜索</h3>
        <div class="search-row"><input id="cropNameSearch" placeholder="输入农作物名称，如玉米/草莓"><button class="btn blue" onclick="searchCropByName()">搜索</button></div>
        <p class="dim" id="cropNameSearchHint">同一好友同一作物多块地时，展示最早成熟时间。</p>
        <div class="table-wrap"><table><thead><tr><th>好友</th><th>作物</th><th>地块</th><th>最早成熟</th><th>倒计时</th><th>成熟可摘/已成熟</th></tr></thead><tbody id="cropNameSearchBody"><tr><td colspan="6" class="dim">输入作物名后搜索</td></tr></tbody></table></div>
      </div>
    </section>

    <div id="friendModal" class="modal-overlay" style="display:none" onclick="closeFriendModal()"><div class="modal-content" onclick="event.stopPropagation()"><div class="modal-header"><h2 id="modalTitle">土地作物详情</h2><button class="modal-close" onclick="closeFriendModal()">✕</button></div><div class="modal-body"><div id="modalLandSummary" class="friend-summary"></div><div class="land-grid" id="modalLandGrid"></div></div><div class="modal-footer"><button class="btn" onclick="closeFriendModal()">关闭</button></div></div></div>
    <section class="panel"><div class="panel-head"><div class="panel-title">自动化日志</div><button class="btn" onclick="loadLogs()">刷新日志</button></div><div class="log" id="logs">--</div></section>
  </main>
  <script src="/js/maturity-api-fallback.js"></script>
  <script src="/js/plant-images.js"></script>
  <script src="/js/maturity-core.js"></script>
  <script src="/js/maturity-extra.js"></script>
  <script src="/js/maturity-detail.js"></script>
</body>
</html>
