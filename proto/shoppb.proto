syntax = "proto3";

package gamepb.shoppb;

message ShopItem {
    int64 id = 1;
    int64 type = 2;
    int64 item_id = 3;
    int64 item_count = 4;
    int64 price = 5;
    int64 currency_type = 6;
    int64 buy_limit = 7;
    int64 bought_count = 8;
    int64 start_time = 9;
    int64 end_time = 10;
    int64 sort_order = 11;
}

message ShopInfo {
    int64 shop_id = 1;
    repeated ShopItem items = 2;
}

message ShopRequest {
    int64 shop_id = 1;
}

message ShopReply {
    ShopInfo shop = 1;
}

message BuyRequest {
    int64 shop_id = 1;
    int64 item_id = 2;
    int64 count = 3;
}

message BuyReply {
    bool success = 1;
    int64 error_code = 2;
    string error_message = 3;
}