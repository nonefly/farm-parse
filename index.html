  <style>

    .hover\:bg-green-200:hover{background-color:#bbf7d0}.transition-all{transition-property:all;transition-timing-function:cubic-bezier(.4,0,.2,1);transition-duration:150ms}.flex-1{flex:1}.bg-gradient-to-r{background:linear-gradient(to right, var(--tw-gradient-stops))}
    .from-green-500{--tw-gradient-from:#22c55e;--tw-gradient-stops:#22c55e,var(--tw-gradient-to)}.to-emerald-600{--tw-gradient-to:#16a34a}.text-white{color:#fff}.hover\:from-green-600:hover{--tw-gradient-from:#16a34a;--tw-gradient-stops:#16a34a,var(--tw-gradient-to)}

    .border-gray-300{border-color:#d1d5db}.text-gray-600{color:#4b5563}.hover\:bg-gray-50:hover{background-color:#f9fafb}

    .px-3{padding-left:.75rem;padding-right:.75rem}.py-1{padding-top:.25rem;padding-bottom:.25rem}.rounded-full{border-radius:9999px}.text-xs{font-size:.75rem;line-height:1rem}.bg-red-100{background-color:#fee2e2}.text-red-700{color:#b91c1c}

    .grid{display:grid}.grid-cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}.sm\:grid-cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}@media(min-width:640px){.sm\:grid-cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}}
    .gap-4{gap:1rem}.p-4{padding:1rem}.sm\:p-6{padding:1.5rem}.border-gray-100{border-color:#f3f4f6}.text-center{text-align:center}.text-gray-700{color:#374151}
    .col-span-1{grid-column:span 1 / span 1}.sm\:col-span-2{grid-column:span 2 / span 2}.sm\:col-span-3{grid-column:span 3 / span 3}.sm\:col-span-4{grid-column:span 4 / span 4}
    
    .toggle-switch{position:relative;width:60px;height:30px;background:#e5e7eb;border-radius:30px;transition:.3s;cursor:pointer}.toggle-switch.active{background:#22c55e}.toggle-switch::after{content:'';position:absolute;width:26px;height:26px;background:white;border-radius:50%;top:2px;left:2px;transition:.3s;box-shadow:0 2px 5px rgba(0,0,0,.2)}.toggle-switch.active::after{left:32px}
    .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:white;padding:12px 24px;border-radius:30px;font-size:14px;z-index:9999;animation:slideUp .3s ease;white-space:nowrap;max-width:90%}@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    .loading{display:inline-block;width:18px;height:18px;border:3px solid #f3f3f3;border-top:3px solid #22c55e;border-radius:50%;animation:spin 1s linear infinite}@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    .land-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}.land-cell{aspect-ratio:1;border-radius:10px;position:relative;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 4px;border:2px solid #e5e7eb;overflow:hidden}
    .land-cell:hover{transform:scale(1.05);z-index:10}.land-cell.locked{background:#f3f4f6;border-color:#d1d5db;color:#9ca3af}.land-cell.unlocked{background:#f0fdf4;border-color:#86efac}.land-cell.empty{background:#fef3c7;border-color:#fbbf24}.land-cell.mutant{animation:glow 2s ease-in-out infinite}
    .land-cell.mutant-ice{background:linear-gradient(135deg,#dbeafe,#bfdbfe);border-color:#3b82f6}.land-cell.mutant-love{background:linear-gradient(135deg,#fce7f3,#fbcfe8);border-color:#ec4899}.land-cell.mutant-dark{background:linear-gradient(135deg,#1f2937,#374151);border-color:#4b5563}
    .land-cell.mutant-wet{background:linear-gradient(135deg,#d1fae5,#a7f3d0);border-color:#06b6d4}.land-cell.mutant-gold{background:linear-gradient(135deg,#fef3c7,#fde68a);border-color:#eab308}.land-cell.mutant-crystal{background:linear-gradient(135deg,#f3e8ff,#e9d5ff);border-color:#a855f7}
    .land-cell.mutant-shine{background:linear-gradient(135deg,#fef9c3,#fef08a);border-color:#fbbf24}.land-cell.mutant-lucky{background:linear-gradient(135deg,#dcfce7,#bbf7d0);border-color:#22c55e}.land-cell.mutant-pumpkin{background:linear-gradient(135deg,#fdba74,#fb923c);border-color:#ea580c}
    .land-cell.mutant-tower{background:linear-gradient(135deg,#ddd6fe,#c4b5fd);border-color:#7c3aed}.land-cell.mutant-ice-crystal{background:linear-gradient(135deg,#e0f2fe,#bae6fd);border-color:#0ea5e9}.land-cell.mutant-desert{background:linear-gradient(135deg,#fef3c7,#fed7aa);border-color:#d97706}
    .land-cell.mutant-luxury{background:linear-gradient(135deg,#fef3c7,#fde68a);border-color:#f59e0b}.land-cell.mutant-snow{background:linear-gradient(135deg,#f0f9ff,#e0f2fe);border-color:#7dd3fc}@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(245,158,11,.4)}50%{box-shadow:0 0 16px rgba(245,158,11,.6)}}
    .mutant-badge{position:absolute;top:-6px;right:-6px;background:#f59e0b;color:white;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;box-shadow:0 2px 4px rgba(0,0,0,.2)}
    .plant-icon{font-size:24px;line-height:1;margin-bottom:2px}.plant-name{font-size:10px;font-weight:600;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;margin-bottom:1px}
    .land-cell.mutant-dark .plant-name,.land-cell.mutant-dark .plant-phase{color:#f9fafb !important}.land-cell:not(.mutant-dark) .plant-name{color:#374151}.plant-phase{font-size:8px;color:#6b7280;margin-bottom:1px}
    .mutant-type-tag{font-size:8px;font-weight:500;padding:1px 4px;border-radius:4px;background:rgba(0,0,0,.1);color:#374151;margin-top:1px}.land-cell.mutant-dark .mutant-type-tag{background:rgba(255,255,255,.2);color:#f9fafb}

    @keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateX(-50%) translateY(-10px)}}

</head>
<body class="min-h-screen bg-gradient-to-br from-green-50 to-emerald-100">
  <div class="max-w-3xl mx-auto p-4 sm:p-6">
    <div class="text-center mb-6">
      <h1 class="text-2xl sm:text-3xl font-bold text-green-800 flex items-center justify-center gap-2">
        <span>🌾</span> 农场变异查看器
      </h1>
      <p class="text-green-600/70 text-sm mt-1">解析HEX数据，查看土地变异情况</p>
    </div>

    <div class="bg-white rounded-xl shadow-lg p-4 sm:p-6 mb-6">
      <div class="flex items-center justify-between bg-gray-50 rounded-lg p-3 mb-4">
        <div>
          <div class="font-medium text-gray-800">自动解析模式</div>
          <div class="text-xs text-gray-500">开启后自动读取剪贴板并解析HEX数据</div>
        </div>
        <div class="toggle-switch" id="toggleSwitch"></div>
      </div>

      <form id="parseForm" class="space-y-4" onsubmit="handleParse(event)">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">HEX数据</label>
          <textarea
            id="hex"
            name="hex"
            rows="4"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 resize-none font-mono text-sm placeholder:text-gray-400"
            placeholder="请输入农场协议HEX数据..."></textarea>
        </div>
        <div class="flex gap-3">
          <button
            type="button"
            id="pasteBtn"
            class="px-4 py-3 bg-green-100 text-green-700 border border-green-300 rounded-lg font-semibold hover:bg-green-200 transition-all"
            onclick="handlePaste()"
          >
            📋 粘贴
          </button>
          <button
            type="submit"
            id="parseBtn"
            class="flex-1 bg-gradient-to-r from-green-500 to-emerald-600 text-white py-3 px-6 rounded-lg font-semibold hover:from-green-600 hover:to-emerald-700 transition-all shadow-md hover:shadow-lg"
          >
            🔍 解析数据
          </button>
          <button
            type="button"
            id="clearBtn"
            class="px-6 py-3 border border-gray-300 text-gray-600 rounded-lg font-semibold hover:bg-gray-50 transition-all"
            onclick="handleClear()"
          >
            清空
          </button>
        </div>
      </form>
    </div>

    <div id="resultContainer" style="display: none;" class="bg-white rounded-xl shadow-lg overflow-hidden mb-6">
      <div class="px-4 sm:px-6 py-4 border-b border-gray-200 flex items-center justify-between flex-wrap gap-2">
        <h2 class="text-lg font-bold text-gray-800 flex items-center gap-2">
          <span>📊</span> 解析结果
        </h2>
        <span id="resultStatus" class="px-3 py-1 rounded-full text-xs font-semibold"></span>
      </div>
      <div id="resultContent"></div>
    </div>

    

    <div id="toast" class="toast" style="display: none;"></div>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
