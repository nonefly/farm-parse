syntax = "proto3";

package gamepb.itempb;

import "corepb.proto";

message ItemInfo {
    int64 id = 1;
    string name = 2;
    int64 type = 3;
    int64 count = 4;
    int64 expire_time = 5;
    string description = 6;
}

message BagRequest {
}

message BagReply {
    repeated ItemInfo items = 1;
}

message UseItemRequest {
    int64 item_id = 1;
    int64 count = 2;
    int64 target_id = 3;
}

message UseItemReply {
    bool success = 1;
    int64 error_code = 2;
}