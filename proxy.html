<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>农场信息解析</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#f0fdf4,#d1fae5);color:#111827;overflow-x:hidden}
    .page{max-width:960px;margin:0 auto;padding:20px 20px 140px}
    .top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:16px;flex-wrap:wrap}
    .title h1{margin:0;font-size:26px;color:#166534}
    .title p{margin:6px 0 0;color:#15803d;font-size:14px}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{border:1px solid #d1d5db;background:#fff;color:#374151;border-radius:8px;padding:9px 12px;font-weight:700;text-decoration:none;font-size:14px;cursor:pointer;transition:0.1s ease;white-space:nowrap}
    .btn:active{transform:scale(0.96)}
    .btn.primary{background:#16a34a;color:#fff;border-color:#16a34a}
    .btn.active{background:#dc2626;color:#fff;border-color:#dc2626}
    .btn.small{padding:4px 10px;font-size:12px}
    .modal{position:fixed;top:0;left:0;right:0;bottom:0;z-index:1000;display:flex;align-items:center;justify-content:center}
    .modal-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5)}
    .modal-content{position:relative;background:#fff;border-radius:12px;width:90%;max-width:600px;max-height:80vh;overflow:hidden;box-shadow:0 25px 50px -12px rgba(0,0,0,.25)}
    .modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #e5e7eb}
    .modal-header h2{margin:0;font-size:18px}
    .modal-close{background:none;border:none;font-size:20px;color:#6b7280;cursor:pointer;padding:4px 8px}
    .modal-close:hover{color:#111827}
    .modal-body{padding:20px;max-height:400px;overflow-y:auto;line-height:1.5;font-family:system-ui}
    .modal-body ul{margin:8px 0;padding-left:20px}
    .modal-body li{margin:4px 0}
    .modal-body h1,.modal-body h2,.modal-body h3{margin:12px 0 6px}
    .modal-body p{margin:6px 0}
    .modal-footer{padding:16px 20px;border-top:1px solid #e5e7eb;text-align:right}
    .extra-info{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(135deg,#f0fdf4,#d1fae5);border-top:1px solid #bbf7d0;padding:12px 20px;text-align:center;max-height:100px;overflow-y:auto;z-index:100}
    .status-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
    .summary-card{background:#fff;border-radius:20px;padding:12px 6px;text-align:center;border:1px solid #eef2ff;box-shadow:0 2px 6px rgba(0,0,0,0.02);min-height:80px;max-height:100px;display:flex;flex-direction:column;justify-content:center;overflow-y:auto;word-break:break-word}
    .summary-card::-webkit-scrollbar{width:3px;height:3px}
    .summary-card::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:10px}
    .label{font-size:11px;color:#4b5563;margin-bottom:5px;font-weight:500}
    .value{font-size:14px;font-weight:800;color:#1e293b;word-break:break-word;line-height:1.3}
    .panel{background:#fff;border-radius:28px;box-shadow:0 8px 20px rgba(0,0,0,0.05);overflow:hidden;margin-bottom:18px}
    .panel-head{padding:12px 16px;border-bottom:1px solid #eef2ff;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
    .panel-title{font-size:16px;font-weight:800;color:#0f172a}
    .badge{display:inline-flex;border-radius:40px;padding:4px 12px;font-size:12px;font-weight:700}
    .badge.ok{background:#dcfce7;color:#166534}
    .badge.warn{background:#fef3c7;color:#92400e}
    .summary{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:16px;border-bottom:1px solid #f1f5f9}
    .summary .summary-card{background:#f9fafb;border:none;box-shadow:none;border-radius:16px;min-height:70px;max-height:85px;padding:8px 6px}
    .section{padding:12px 16px}
    .section-title{font-size:15px;font-weight:800;margin:0 0 10px 0;display:flex;align-items:center;gap:8px}
    .help{font-size:12px;color:#4b5563;line-height:1.45}
    .empty{padding:36px 20px;text-align:center;background:#ffffffdb;border-radius:28px;font-size:14px;color:#5b6e8c}
    .mono{font-family:monospace}
    .land-grid{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:8px;margin-top:6px}
    .land-grid .spacer{visibility:hidden;pointer-events:none}
    .land-cell{aspect-ratio:1/1;border-radius:14px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5px 3px;border:1.5px solid #e2e8f0;background:#fefce8;transition:all 0.05s linear;overflow:hidden}
    .land-cell.big-crop{border-color:#f97316;border-width:2.5px;box-shadow:0 0 12px rgba(249,115,22,0.35);background:linear-gradient(145deg,#fff7ed,#ffedd5)}
    .land-cell.mutant.big-crop{border-color:#f97316;border-width:2.5px;box-shadow:0 0 12px rgba(249,115,22,0.4),0 0 5px rgba(250,204,21,0.4)}
    .land-cell.locked{background:url('/img/land/land_0.png') center/cover no-repeat;border-color:#cbd5e1}
    .land-cell.unlocked{background:#f0fdf4;border-color:#bbf7d0}
    .land-cell.empty{background:url('/img/land/land_1.png') center/cover #f0fdf4}
    .land-cell.mutant{animation:softGlow 1.8s ease-in-out infinite}
    .land-cell.mutant-ice{background:linear-gradient(145deg,#dbeafe,#bfdbfe);border-color:#3b82f6}
    .land-cell.mutant-love{background:linear-gradient(145deg,#fce7f3,#fbcfe8);border-color:#ec4899}
    .land-cell.mutant-dark{background:linear-gradient(145deg,#1e293b,#334155);border-color:#64748b}
    .land-cell.mutant-wet{background:linear-gradient(145deg,#d1fae5,#a7f3d0);border-color:#14b8a6}
    .land-cell.mutant-gold{background:linear-gradient(145deg,#fef3c7,#fde68a);border-color:#eab308}
    .land-cell.mutant-mianmian{background:linear-gradient(145deg,#fce7f3,#e0f2fe);border-color:#f9a8d4}
    .land-cell.mutant-crystal{background:linear-gradient(145deg,#f3e8ff,#e9d5ff);border-color:#a855f7}
    .land-cell.mutant-shine{background:linear-gradient(145deg,#fef9c3,#fef08a);border-color:#facc15}
    .land-cell.mutant-lucky{background:linear-gradient(145deg,#dcfce7,#bbf7d0);border-color:#22c55e}
    .land-cell.mutant-pumpkin{background:linear-gradient(145deg,#fed7aa,#fdba74);border-color:#f97316}
    .land-cell.mutant-tower{background:linear-gradient(145deg,#e0e7ff,#c7d2fe);border-color:#6366f1}
    .land-cell.mutant-ice-crystal{background:linear-gradient(145deg,#e0f2fe,#bae6fd);border-color:#0ea5e9}
    .land-cell.mutant-desert{background:linear-gradient(145deg,#fed7aa,#ffedd5);border-color:#d97706}
    .land-cell.mutant-luxury{background:linear-gradient(145deg,#fef3c7,#fde68a);border-color:#f59e0b}
    .land-cell.mutant-snow{background:linear-gradient(145deg,#f0f9ff,#e0f2fe);border-color:#7dd3fc}
    @keyframes softGlow{0%,100%{box-shadow:0 0 5px rgba(250,204,21,0.4)}50%{box-shadow:0 0 12px rgba(245,158,11,0.6)}}
    .land-no{position:absolute;top:3px;left:4px;font-size:8px;font-weight:700;background:rgba(255,248,200,0.7);padding:1px 4px;border-radius:20px;font-family:monospace}
    .mutant-badge{position:absolute;top:-5px;right:-5px;background:#f97316;color:white;border-radius:30px;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;border:1px solid #fff}
    .mutant-imgs{display:flex;gap:2px;justify-content:center;align-items:center;flex:0 0 auto;max-height:16px;overflow:hidden;margin:1px 0}
    .mutant-img{max-width:100%;max-height:12px;width:auto;height:auto;object-fit:contain;display:block;flex:0 0 auto}
    .plant-img{max-width:80%;max-height:70%;width:auto;height:auto;object-fit:contain;display:block;margin:0 auto;flex:1 1 auto;min-height:0}
    .plant-icon{font-size:22px;line-height:1;margin-bottom:2px}
    .plant-name{font-size:10px;font-weight:800;text-align:center;white-space:nowrap;overflow-x:auto;max-width:100%;display:inline-block;padding:0 2px;padding-bottom:2px}
    .plant-name::-webkit-scrollbar{height:2px}
    .plant-phase{font-size:8px;color:#4b5563;margin-top:1px;font-weight:500}
    .mutant-tags{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;margin-top:2px}
    .mutant-type-tag{font-size:7px;font-weight:700;padding:1px 5px;border-radius:30px;background:rgba(0,0,0,0.08);color:#2d3e50}
    .land-cell.mutant-dark .plant-name,.land-cell.mutant-dark .plant-phase,.land-cell.mutant-dark .mutant-type-tag{color:#f1f5f9}
    .land-cell.mutant-dark .mutant-type-tag{background:rgba(255,255,255,0.2)}
    .details{display:flex;flex-direction:column;gap:10px;max-height:280px;overflow-y:auto;padding-right:4px}
    .detail-row{border-bottom:1px solid #f0f2f5;padding:8px 0;max-height:100px;overflow-y:auto}
    .detail-title{display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px}
    .detail-text{margin-top:5px;color:#475569;font-size:11px;word-break:break-word}
    @media(max-width:560px){.land-grid{gap:5px}.mutant-img{max-height:10px}.plant-icon{font-size:19px}.plant-name{font-size:9px}.mutant-badge{width:18px;height:18px;font-size:9px;top:-4px;right:-4px}}
    @media(max-width:420px){.land-grid{gap:4px}.mutant-img{max-height:8px}.plant-icon{font-size:17px}.plant-name{font-size:8px}.mutant-type-tag{font-size:6px;padding:1px 3px}}
  </style>
  <script src="/js/plant-images.js"></script>
</head>
<body>
  <main class="page">
    <div class="top">
      <div class="title">
        <h1>农场信息解析</h1>
        <p>解析农场土地信息，展示 24 块土地和作物变异。</p>
      </div>
      <div class="actions">
        <button class="btn" id="proxyToggle" onclick="toggleProxy()">🚀 开始解析</button>
        <a class="btn" href="/ca.cer" download>📄 下载证书</a>
        <button class="btn" onclick="showHelp()">📖 使用说明</button>
      </div>
    </div>

    <section class="status-grid">
      <div class="summary-card"><div class="label">HTTP 页面</div><div class="value mono" id="httpAddr">--</div></div>
      <div class="summary-card"><div class="label">解析端口</div><div class="value mono" id="proxyAddr">--</div></div>
      <div class="summary-card"><div class="label">目标连接</div><div class="value" id="connections">0</div></div>
      <div class="summary-card"><div class="label">解析帧</div><div class="value" id="frames">0/0</div></div>
    </section>

    <section class="panel" id="mobileGuide" style="display: none;">
      <div class="section">
        <h3 class="section-title">📱 手机配置指南</h3>
        <div id="mobileGuideContent"></div>
      </div>
    </section>
    
    <section class="panel">
      <div class="section">
        <div class="help">⚠️ 如遇网络异常，请结束解析并重启程序后再尝试。</div>
      </div>
    </section>

    <section id="result">
      <div class="empty">等待农场 WebSocket 数据...</div>
    </section>

    <footer id="extraInfo" class="extra-info" style="display: none;">
      <div id="extraContent"></div>
    </footer>

    <div id="helpModal" class="modal" style="display: none;">
      <div class="modal-overlay" onclick="closeHelp()"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2>📖 使用说明</h2>
          <button class="modal-close" onclick="closeHelp()">✕</button>
        </div>
        <div class="modal-body" id="helpContent">加载中...</div>
        <div class="modal-footer">
          <button class="btn primary" onclick="closeHelp()">知道了</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const resultEl = document.getElementById('result');
    const seen = new Set();
    let latestFarmEvent = null;
    let isProxyActive = false;
    let isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    let localAddress = '127.0.0.1';

    const mutationImageMap = {
      '哈哈': '/img/Mutation/haha.png',
      '塔塔': '/img/Mutation/tata.png',
      '冰冻': '/img/Mutation/frozen.png',
      '爱心': '/img/Mutation/love.png',
      '暗化': '/img/Mutation/dark.png',
      '湿润': '/img/Mutation/moist.png',
      '黄金': '/img/Mutation/golden.png',
      '绵绵': '/img/Mutation/mianmian.png'
    };

    const BIG_CROP_NAMES = ['哈哈南瓜', '哈哈南瓜塔', '黄金·哈哈南瓜塔', '黄金·哈哈南瓜', '黄金·爱心果', '爱心果'];

    function isBigCrop(plantName) {
      return BIG_CROP_NAMES.indexOf(plantName) >= 0;
    }

    async function toggleProxy() {
      const btn = document.getElementById('proxyToggle');
      btn.disabled = true;
      btn.textContent = '处理中...';
      try {
        const enable = !isProxyActive;
        const res = await fetch('/api/proxy/toggle', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enable })
        });
        const data = await res.json();
        if (data.success) {
          isProxyActive = enable;
          if (enable) {
            btn.textContent = '⏹️ 结束解析';
            btn.classList.add('active');
          } else {
            btn.textContent = '🚀 开始解析';
            btn.classList.remove('active');
          }
        } else {
          alert('操作失败：' + (data.message || '未知错误'));
        }
      } catch (err) {
        alert('操作失败：' + err.message);
      } finally {
        btn.disabled = false;
      }
    }

    const phaseMap = {
      0: '未知',
      1: '种子',
      2: '发芽',
      3: '小叶',
      4: '大叶',
      5: '开花',
      6: '成熟',
      7: '枯死'
    };

    function getCurrentPhase(plant) {
      if (!plant || !plant.phases || plant.phases.length === 0) return 0;
      const phases = plant.phases;
      return phases[phases.length - 1].phase || 0;
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      })[ch]);
    }

    function fmtTime(value) {
      return new Date(value).toLocaleString();
    }

    function renderLandGrid(event) {
      const lands = [...(event.lands || [])].sort((a, b) => (Number(a.id) || 0) - (Number(b.id) || 0));
      const mutants = event.mutants || [];

      const bigCropAnchors = {};
      const occupiedByBigCrop = {};
      for (const l of lands) {
        if (!l.plant || !l.plant.name) continue;
        if (isBigCrop(l.plant.name)) {
          const anchorId = Number(l.id);
          const occupied = [anchorId, anchorId - 4, anchorId + 1, anchorId - 3];
          for (const occId of occupied) {
            occupiedByBigCrop[occId] = true;
          }
          bigCropAnchors[anchorId] = true;
        }
      }

      let html = '<div class="land-grid">';
      for (let row = 0; row < 4; row++) {
        for (let col = 5; col >= 0; col--) {
          const landId = col * 4 + row + 1;
          const visCol = 6 - col;
          const visRow = row + 1;

          if (occupiedByBigCrop[landId] && !bigCropAnchors[landId]) continue;

          const land = lands.find(item => Number(item.id) === landId);
          if (!land) {
            html += `<div class="land-cell locked" style="grid-column:${visCol};grid-row:${visRow};"></div>`;
            continue;
          }

          const plant = land.plant;
          const hasPlant = !!(plant && plant.id);
          const isBig = hasPlant && isBigCrop(plant.name);
          const mutant = mutants.find(item => Number(item.landId) === landId);
          const isMutant = !!mutant;
          const primaryClass = mutant?.primaryClass || 'mutant-gold';

          let cellClass;
          if (!land.unlocked) {
            cellClass = 'land-cell locked';
          } else if (!hasPlant) {
            cellClass = 'land-cell unlocked empty';
          } else if (isMutant) {
            cellClass = `land-cell mutant ${primaryClass}`;
          } else {
            cellClass = 'land-cell unlocked';
          }

          const styleParts = [
            `grid-column:${visCol}${isBig ? '/span 2' : ''}`,
            `grid-row:${visRow}${isBig ? '/span 2' : ''}`
          ];

          if (isBig) cellClass += ' big-crop';

          const phase = getCurrentPhase(plant);
          const tags = [];
          if (mutant?.details) {
            for (const detail of mutant.details) {
              if (!tags.includes(detail.type)) tags.push(detail.type);
            }
          }

          html += `<div class="${cellClass}" title="土地${landId}: ${escapeHtml(hasPlant ? plant.name : '空置')}" style="${styleParts.join(';')}">`;

          if (!land.unlocked) {
            // 锁定状态由CSS背景显示
          } else {
            html += `<span class="land-no">#${landId}</span>`;

            if (hasPlant) {
              const plantFileName = typeof plantImageMap !== 'undefined' ? plantImageMap[plant.name] : null;
              if (plantFileName) {
                html += `<img class="plant-img" src="/img/plant/${plantFileName}" alt="${escapeHtml(plant.name)}">`;
              } else if (isMutant) {
                const imgs = [];
                if (mutant.details) {
                  for (const detail of mutant.details) {
                    const src = mutationImageMap[detail.type];
                    if (src && !imgs.includes(src)) imgs.push(src);
                  }
                }
                if (imgs.length > 0) {
                  html += '<div class="mutant-imgs">';
                  for (const imgSrc of imgs) {
                    html += `<img class="mutant-img" src="${imgSrc}" alt="变异">`;
                  }
                  html += '</div>';
                } else {
                  html += `<span class="plant-icon" style="margin-bottom:0;">${escapeHtml(mutant.primaryIcon || '✨')}</span>`;
                }
              } else {
                html += '<span class="plant-icon">🌱</span>';
              }

              html += `<div class="plant-name">${escapeHtml(plant.name || plant.id)}</div>`;

              if (tags.length > 0) {
                html += '<div class="mutant-tags">';
                for (const tag of tags) {
                  html += `<span class="mutant-type-tag">${escapeHtml(tag)}</span>`;
                }
                html += '</div>';
              }

              if (isMutant) html += '<div class="mutant-badge">✦</div>';
            }
          }
          html += '</div>';
        }
      }
      html += '</div>';
      return html;
    }

    function renderFarmEvent(event) {
      const badgeClass = event.mutantCount > 0 ? 'warn' : 'ok';
      const ownerName = event.isOwnFarm ? '我的农场' : escapeHtml(event.friendInfo?.name || '未知');
      resultEl.innerHTML = `<section class="panel">
        <div class="panel-head">
          <div class="panel-title">${event.isOwnFarm ? '我的农场' : '解析结果'}</div>
          <span class="badge ${badgeClass}">${event.mutantCount > 0 ? `发现 ${event.mutantCount} 个变异` : '解析成功'}</span>
        </div>
        <div class="summary">
          <div class="summary-card"><div class="label">${event.isOwnFarm ? '我的农场' : '好友'}</div><div class="value">${ownerName}</div></div>
          <div class="summary-card"><div class="label">土地数</div><div class="value">${event.landCount || 0}</div></div>
        </div>
        <div class="section">
          <h3 class="section-title">农场土地 (4x6)</h3>
          ${renderLandGrid(event)}
        </div>
        <div class="section"><div class="help">更新时间：${fmtTime(event.time)}</div></div>
      </section>`;
    }

    function addEvent(event) {
      if (!event || event.type === 'hello') return;
      if (event.id && seen.has(event.id)) return;
      if (event.id) seen.add(event.id);
      if (event.lands) {
        latestFarmEvent = event;
        renderFarmEvent(event);
      }
    }

    async function refreshStatus() {
      const res = await fetch('/api/status');
      const status = await res.json();
      const address = status.addresses && status.addresses[0] ? status.addresses[0] : '127.0.0.1';
      localAddress = address;
      document.getElementById('httpAddr').textContent = `${address}:${status.httpPort}`;
      document.getElementById('proxyAddr').textContent = `${address}:${status.proxyPort}`;
      document.getElementById('connections').textContent = status.targetConnections;
      document.getElementById('frames').textContent = `${status.parsedFrames}/${status.totalFrames}`;
      
      const mobileProxyAddr = document.getElementById('mobileProxyAddr');
      if (mobileProxyAddr) {
        mobileProxyAddr.textContent = address;
      }
      
      if (latestFarmEvent && !latestFarmEvent.currentUser && status.currentUser) {
        latestFarmEvent.currentUser = status.currentUser;
        renderFarmEvent(latestFarmEvent);
      }
      
      updateIOSButtons();
    }
    
    function updateIOSButtons() {
      let iosContainer = document.getElementById('iosContainer');
      if (isIOS && !iosContainer) {
        const actionsDiv = document.querySelector('.actions');
        const iosDiv = document.createElement('div');
        iosDiv.id = 'iosContainer';
        iosDiv.className = 'ios-section';
        iosDiv.innerHTML = `
          <button class="btn" onclick="showIOSConfig()">🍎 iOS配置</button>
        `;
        actionsDiv.appendChild(iosDiv);
      }
    }
    
    function showIOSConfig() {
      const modal = document.getElementById('iosModal');
      if (modal) {
        modal.style.display = 'flex';
        return;
      }
      
      const modalHTML = `
        <div id="iosModal" class="modal">
          <div class="modal-overlay" onclick="closeIOSModal()"></div>
          <div class="modal-content">
            <div class="modal-header">
              <h2>🍎 iOS手机配置指南</h2>
              <button class="modal-close" onclick="closeIOSModal()">✕</button>
            </div>
            <div class="modal-body">
              <h3>第一步：下载证书</h3>
              <p>点击下方按钮下载并安装CA证书（需要信任此证书）：</p>
              <a class="btn primary" href="/ca.cer" download style="display:inline-block;margin:8px 0;text-decoration:none;">📄 下载证书</a>
              
              <h3 style="margin-top:16px;">第二步：一键配置代理</h3>
              <p>点击下方按钮下载描述文件并安装：</p>
              <a class="btn primary" href="/api/ios-profile.mobileconfig" style="display:inline-block;margin:8px 0;text-decoration:none;">📱 一键配置代理</a>
              
              <h3 style="margin-top:16px;">第三步：信任证书（重要）</h3>
              <ol>
                <li>打开「设置」→「通用」→「VPN与设备管理」</li>
                <li>找到并点击「农场解析代理配置」，然后点击「安装」</li>
                <li>打开「设置」→「通用」→「关于本机」→「证书信任设置」</li>
                <li>找到「farm-parse」相关证书，开启信任</li>
              </ol>
              
              <h3 style="margin-top:16px;">第四步：使用代理</h3>
              <p>配置完成后，游戏流量会自动通过本服务器解析。</p>
              <p class="help" style="margin-top:12px;background:#fef3c7;padding:12px;border-radius:8px;">
                ⚠️ 使用完毕后，请在「设置」→「通用」→「VPN与设备管理」中删除描述文件，或在WiFi设置中关闭代理。
              </p>
            </div>
            <div class="modal-footer">
              <button class="btn primary" onclick="closeIOSModal()">知道了</button>
            </div>
          </div>
        </div>
      `;
      document.body.insertAdjacentHTML('beforeend', modalHTML);
      document.getElementById('iosModal').style.display = 'flex';
    }
    
    function closeIOSModal() {
      const modal = document.getElementById('iosModal');
      if (modal) modal.style.display = 'none';
    }

    async function loadHistory() {
      const res = await fetch('/api/events');
      const events = await res.json();
      const farmEvents = events.filter(event => event.lands);
      if (farmEvents.length > 0) addEvent(farmEvents[0]);
    }

    const stream = new EventSource('/api/stream');
    stream.onmessage = message => {
      addEvent(JSON.parse(message.data));
      refreshStatus().catch(() => {});
    };

    function parseMarkdown(text) {
      return String(text || '')
        .replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/<li><\/li>/g, '')
        .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>')
        .replace(/^<\/p>/gm, '')
        .replace(/<p>$/gm, '')
        .replace(/<\/p><p>/g, '</p>\n<p>')
        .trim();
    }

    async function showHelp() {
      const modal = document.getElementById('helpModal');
      const content = document.getElementById('helpContent');
      modal.style.display = 'flex';
      try {
        const res = await fetch('/README.use.md');
        const mdText = await res.text();
        content.innerHTML = '<p>' + parseMarkdown(mdText) + '</p>';
      } catch {
        content.textContent = '加载帮助文档失败';
      }
    }

    function closeHelp() {
      const modal = document.getElementById('helpModal');
      modal.style.display = 'none';
      localStorage.setItem('helpShown', 'true');
    }

    async function loadExtraInfo() {
      try {
        const res = await fetch('/api/about', {
          method: 'GET',
          headers: {
            'Accept': 'text/plain',
            'Cache-Control': 'no-cache'
          }
        });
        if (!res.ok) return;
        const text = await res.text();
        const trimmed = text.trim();
        if (trimmed && trimmed.length > 0) {
          document.getElementById('extraContent').textContent = trimmed;
          document.getElementById('extraInfo').style.display = 'block';
        }
      } catch (err) {
        // 忽略
      }
    }

    loadHistory().catch(() => {});
    refreshStatus().catch(() => {});
    loadExtraInfo().catch(() => {});
    setInterval(() => refreshStatus().catch(() => {}), 3000);

    if (!localStorage.getItem('helpShown')) {
      localStorage.setItem('helpShown', 'true');
      setTimeout(() => showHelp(), 800);
    }
    
    showMobileGuide();
    
    function showMobileGuide() {
      const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      if (isMobile) {
        const guideEl = document.getElementById('mobileGuide');
        const contentEl = document.getElementById('mobileGuideContent');
        guideEl.style.display = 'block';
        
        if (isIOS) {
          contentEl.innerHTML = `
            <p style="margin: 8px 0;line-height:1.6;">
              🍎 检测到iOS设备，请点击顶部「<strong>iOS配置</strong>」按钮获取详细配置指南。
            </p>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;">
              <a class="btn" href="/ca.cer" download style="text-decoration:none;">📄 下载证书</a>
              <a class="btn primary" href="/api/ios-profile.mobileconfig" style="text-decoration:none;">📱 一键配置</a>
            </div>
          `;
        } else {
          contentEl.innerHTML = `
            <p style="margin: 8px 0;line-height:1.6;">
              📱 检测到移动设备，请在WiFi设置中手动配置代理：
            </p>
            <ul style="margin:8px 0;padding-left:20px;line-height:1.8;">
              <li><strong>服务器</strong>：<span id="mobileProxyAddr" class="mono">--</span></li>
              <li><strong>端口</strong>：<span class="mono">8788</span></li>
              <li><strong>证书</strong>：<a href="/ca.cer" download style="color:#16a34a;text-decoration:underline;">点击下载</a>并安装</li>
            </ul>
          `;
        }
      }
    }

    function resetHelp() {
      localStorage.removeItem('helpShown');
      alert('下次刷新页面将重新显示使用说明');
    }
  </script>
</body>
</html>
