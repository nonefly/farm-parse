<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>农场信息解析</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(135deg,#f0fdf4,#d1fae5);color:#111827}.page{max-width:960px;margin:0 auto;padding:20px 20px 140px}.top{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:16px}.title h1{margin:0;font-size:26px;color:#166534}.title p{margin:6px 0 0;color:#15803d;font-size:14px}.actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid #d1d5db;background:#fff;color:#374151;border-radius:8px;padding:9px 12px;font-weight:700;text-decoration:none;font-size:14px}.btn.primary{background:#16a34a;color:#fff;border-color:#16a34a}.btn.active{background:#dc2626;color:#fff;border-color:#dc2626}.modal{position:fixed;top:0;left:0;right:0;bottom:0;z-index:1000;display:flex;align-items:center;justify-content:center}.modal-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5)}.modal-content{position:relative;background:#fff;border-radius:12px;width:90%;max-width:600px;max-height:80vh;overflow:hidden;box-shadow:0 25px 50px -12px rgba(0,0,0,.25)}.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid #e5e7eb}.modal-header h2{margin:0;font-size:18px}.modal-close{background:none;border:none;font-size:20px;color:#6b7280;cursor:pointer;padding:4px 8px}.modal-close:hover{color:#111827}.modal-body{padding:20px;max-height:400px;overflow-y:auto;line-height:1.5;font-family:system-ui}.modal-body ul{margin:8px 0;padding-left:20px}.modal-body li{margin:4px 0}.modal-body h1,.modal-body h2,.modal-body h3{margin:12px 0 6px}.modal-body p{margin:6px 0}.modal-footer{padding:16px 20px;border-top:1px solid #e5e7eb;text-align:right}.extra-info{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(135deg,#f0fdf4,#d1fae5);border-top:1px solid #bbf7d0;padding:12px 20px;text-align:center;max-height:100px;overflow-y:auto;z-index:100}.extra-content{font-size:12px;color:#15803d;line-height:1.5}.panel{background:#fff;border-radius:10px;box-shadow:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -2px rgba(0,0,0,.1);overflow:hidden;margin-bottom:12px}.panel-head{padding:10px 14px;border-bottom:1px solid #f3f4f6;display:flex;align-items:center;justify-content:space-between;gap:10px}.panel-title{font-size:15px;font-weight:700}.badge{display:inline-flex;align-items:center;border-radius:999px;padding:3px 8px;font-size:11px;font-weight:700}.badge.ok{background:#dcfce7;color:#166534}.badge.warn{background:#fef3c7;color:#92400e}.summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;padding:10px 14px;border-bottom:1px solid #f3f4f6}.summary-card,.person-card{background:#f9fafb;border-radius:8px;padding:12px;text-align:center}.label{font-size:12px;color:#6b7280;margin-bottom:5px}.value{font-size:14px;font-weight:800;color:#374151;word-break:break-word}.people{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;padding:16px;border-bottom:1px solid #f3f4f6}.person-card{text-align:left}.person-name{font-size:16px;font-weight:800;color:#111827}.person-meta{font-size:12px;color:#6b7280;margin-top:4px}.section{padding:16px}.section-title{font-size:14px;font-weight:800;color:#4b5563;margin:0 0 12px;display:flex;align-items:center;gap:8px}.land-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}.land-cell{aspect-ratio:1;border-radius:10px;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 4px;border:2px solid #e5e7eb;overflow:hidden}.land-cell.locked{background:#f3f4f6;border-color:#d1d5db;color:#9ca3af}.land-cell.unlocked{background:#f0fdf4;border-color:#86efac}.land-cell.empty{background:#fef3c7;border-color:#fbbf24}.land-cell.mutant{animation:glow 2s ease-in-out infinite}.land-cell.mutant-ice{background:linear-gradient(135deg,#dbeafe,#bfdbfe);border-color:#3b82f6}.land-cell.mutant-love{background:linear-gradient(135deg,#fce7f3,#fbcfe8);border-color:#ec4899}.land-cell.mutant-dark{background:linear-gradient(135deg,#1f2937,#374151);border-color:#4b5563}.land-cell.mutant-wet{background:linear-gradient(135deg,#d1fae5,#a7f3d0);border-color:#06b6d4}.land-cell.mutant-gold{background:linear-gradient(135deg,#fef3c7,#fde68a);border-color:#eab308}.land-cell.mutant-crystal{background:linear-gradient(135deg,#f3e8ff,#e9d5ff);border-color:#a855f7}.land-cell.mutant-shine{background:linear-gradient(135deg,#fef9c3,#fef08a);border-color:#fbbf24}.land-cell.mutant-lucky{background:linear-gradient(135deg,#dcfce7,#bbf7d0);border-color:#22c55e}.land-cell.mutant-pumpkin{background:linear-gradient(135deg,#fdba74,#fb923c);border-color:#ea580c}.land-cell.mutant-tower{background:linear-gradient(135deg,#ddd6fe,#c4b5fd);border-color:#7c3aed}.land-cell.mutant-ice-crystal{background:linear-gradient(135deg,#e0f2fe,#bae6fd);border-color:#0ea5e9}.land-cell.mutant-desert{background:linear-gradient(135deg,#fef3c7,#fed7aa);border-color:#d97706}.land-cell.mutant-luxury{background:linear-gradient(135deg,#fef3c7,#fde68a);border-color:#f59e0b}.land-cell.mutant-snow{background:linear-gradient(135deg,#f0f9ff,#e0f2fe);border-color:#7dd3fc}@keyframes glow{0%,100%{box-shadow:0 0 8px rgba(245,158,11,.35)}50%{box-shadow:0 0 16px rgba(245,158,11,.6)}}.land-no{position:absolute;top:4px;left:4px;font-size:8px;color:#9ca3af;font-family:ui-monospace,SFMono-Regular,Consolas,monospace}.mutant-badge{position:absolute;top:-6px;right:-6px;background:#f59e0b;color:#fff;border-radius:50%;width:20px;height:20px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;box-shadow:0 2px 4px rgba(0,0,0,.2)}.plant-icon{font-size:24px;line-height:1;margin-bottom:2px}.plant-name{font-size:10px;font-weight:800;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;margin-bottom:1px}.plant-phase{font-size:8px;color:#6b7280;margin-bottom:1px}.land-cell.mutant-dark .plant-name,.land-cell.mutant-dark .plant-phase{color:#f9fafb}.mutant-tags{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;margin-top:1px}.mutant-type-tag{font-size:8px;font-weight:700;padding:1px 4px;border-radius:4px;background:rgba(0,0,0,.1);color:#374151}.land-cell.mutant-dark .mutant-type-tag{background:rgba(255,255,255,.2);color:#f9fafb}.details{display:grid;gap:10px}.detail-row{border-bottom:1px solid #f3f4f6;padding:10px 0}.detail-row:last-child{border-bottom:0}.detail-title{display:flex;align-items:center;gap:8px;font-weight:800}.detail-text{margin-top:6px;color:#6b7280;font-size:13px}.empty{padding:36px;text-align:center;color:#6b7280;background:#fff;border:1px dashed #d1d5db;border-radius:12px}.mono{font-family:ui-monospace,SFMono-Regular,Consolas,monospace}.help{font-size:13px;color:#4b5563;line-height:1.6}.status-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:16px}@media(max-width:760px){.page{padding:14px}.top{display:block}.actions{margin-top:12px}.summary,.status-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.people{grid-template-columns:1fr}.land-grid{gap:6px}.plant-icon{font-size:20px}}
  </style>
</head>
<body>
  <main class="page">
    <div class="top">
      <div class="title">
        <h1>农场信息解析</h1>
        <p>解析农场土地信息，展示 24 块土地和作物变异。</p>
      </div>
      <div class="actions">
        <button class="btn" id="proxyToggle" onclick="toggleProxy()">🚀 开始解析</button>
        <a class="btn" href="/ca.cer" download>📄 下载证书</a>
        <button class="btn" onclick="showHelp()">📖 使用说明</button>
      </div>
    </div>

    <section class="status-grid">
      <div class="summary-card"><div class="label">HTTP 页面</div><div class="value mono" id="httpAddr">--</div></div>
      <div class="summary-card"><div class="label">解析端口</div><div class="value mono" id="proxyAddr">--</div></div>
      <div class="summary-card"><div class="label">目标连接</div><div class="value" id="connections">0</div></div>
      <div class="summary-card"><div class="label">解析帧</div><div class="value" id="frames">0/0</div></div>
    </section>

    <section class="panel">
      <div class="section">
        <div class="help">⚠️ 如遇网络异常，请结束解析并重启程序后再尝试。</div>
      </div>
    </section>

    <section id="result">
      <div class="empty">等待农场 WebSocket 数据...</div>
    </section>

    <footer id="extraInfo" class="extra-info" style="display: none;">
      <div id="extraContent"></div>
    </footer>

    <div id="helpModal" class="modal" style="display: none;">
      <div class="modal-overlay" onclick="closeHelp()"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2>📖 使用说明</h2>
          <button class="modal-close" onclick="closeHelp()">✕</button>
        </div>
        <div class="modal-body" id="helpContent">加载中...</div>
        <div class="modal-footer">
          <button class="btn primary" onclick="closeHelp()">知道了</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    const resultEl = document.getElementById('result');
    const seen = new Set();
    let latestFarmEvent = null;
    let isProxyActive = false;

    async function toggleProxy() {
      const btn = document.getElementById('proxyToggle');
      btn.disabled = true;
      btn.textContent = '处理中...';
      try {
        const enable = !isProxyActive;
        const res = await fetch('/api/proxy/toggle', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ enable })
        });
        const data = await res.json();
        if (data.success) {
          isProxyActive = enable;
          if (enable) {
            btn.textContent = '⏹️ 结束解析';
            btn.classList.add('active');
          } else {
            btn.textContent = '🚀 开始解析';
            btn.classList.remove('active');
          }
        } else {
          alert('操作失败：' + (data.message || '未知错误'));
        }
      } catch (err) {
        alert('操作失败：' + err.message);
      } finally {
        btn.disabled = false;
      }
    }

    async function verifyProxyStatus(expectedEnable) {
      try {
        await fetch('/api/proxy/refresh');
        const res = await fetch('/api/proxy/status');
        const data = await res.json();
        if (data.proxyEnabled !== expectedEnable) {
          if (expectedEnable) {
            alert('⚠️ 代理可能未完全生效，请手动检查代理设置：「设置-网络与Internet-代理-手动设置代理」');
          } else {
            alert('⚠️ 代理可能未完全关闭，请手动检查代理设置：「设置-网络与Internet-代理-手动设置代理」');
          }
        }
      } catch {
        // 忽略验证失败
      }
    }

    const phaseMap = {
      0: '未知',
      1: '种子',
      2: '发芽',
      3: '小叶',
      4: '大叶',
      5: '开花',
      6: '成熟',
      7: '枯死'
    };

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      })[ch]);
    }

    function fmtTime(value) {
      return new Date(value).toLocaleString();
    }

    function renderPerson(label, person) {
      if (!person) {
        return `<div class="person-card"><div class="label">${label}</div><div class="person-name">待捕获</div><div class="person-meta">该信息需要对应协议响应中包含 BasicInfo</div></div>`;
      }
      return `<div class="person-card">
        <div class="label">${label}</div>
        <div class="person-name">${escapeHtml(person.name || '未知')}</div>
        <div class="person-meta">GID ${escapeHtml(person.gid || '-')} · Lv.${person.level || 0} · 土地 ${person.landCount || '-'}</div>
      </div>`;
    }

    function renderLandGrid(event) {
      const lands = [...(event.lands || [])].sort((a, b) => (Number(a.id) || 0) - (Number(b.id) || 0));
      const mutants = event.mutants || [];
      let html = '<div class="land-grid">';
      for (let row = 0; row < 4; row++) {
        for (let col = 5; col >= 0; col--) {
          const landId = col * 4 + row + 1;
          const land = lands.find(item => Number(item.id) === landId);
          if (!land) {
            html += '<div class="land-cell locked"><span class="land-no">--</span></div>';
            continue;
          }
          const plant = land.plant;
          const hasPlant = !!(plant && plant.id);
          const mutant = mutants.find(item => Number(item.landId) === landId);
          const isMutant = !!mutant;
          const primaryClass = mutant?.primaryClass || 'mutant-gold';
          const cellClass = !land.unlocked
            ? 'land-cell locked'
            : !hasPlant
              ? 'land-cell unlocked empty'
              : isMutant
                ? `land-cell mutant ${primaryClass}`
                : 'land-cell unlocked';
          const phase = plant?.phases?.[plant.phases.length - 1]?.phase || 0;
          const tags = [];
          for (const detail of mutant?.details || []) {
            if (tags.includes(detail.type)) continue;
            tags.push(detail.type);
          }

          html += `<div class="${cellClass}" title="土地${landId}: ${escapeHtml(hasPlant ? plant.name : '空土地')}">
            <span class="land-no">#${landId}</span>`;
          if (!land.unlocked) {
            html += '<span class="plant-icon">🔒</span>';
          } else if (!hasPlant) {
            html += '<span class="plant-phase">空</span>';
          } else {
            html += `<span class="plant-icon">${isMutant ? escapeHtml(mutant.primaryIcon) : '🌱'}</span>
              <span class="plant-name">${escapeHtml(plant.name || plant.id)}</span>
              <span class="plant-phase">${escapeHtml(phaseMap[phase] || `阶段${phase}`)}</span>`;
            if (tags.length > 0) {
              html += '<div class="mutant-tags">';
              for (const tag of tags) html += `<span class="mutant-type-tag">${escapeHtml(tag)}</span>`;
              html += '</div>';
            }
          }
          if (isMutant) html += '<div class="mutant-badge">✦</div>';
          html += '</div>';
        }
      }
      html += '</div>';
      return html;
    }

    function renderDetails(event) {
      const mutants = event.mutants || [];
      if (mutants.length === 0) return '';
      const rows = mutants.map(item => {
        const text = (item.details || []).map(detail => `${detail.type} ${detail.name}(${detail.configId})`).join(', ');
        return `<div class="detail-row">
          <div class="detail-title"><span>${escapeHtml(item.primaryIcon || '✨')}</span><span>${escapeHtml(item.plantName)}</span><span class="label">土地${item.landId}</span></div>
          <div class="detail-text">${escapeHtml(text)}</div>
        </div>`;
      }).join('');
      return `<div class="section"><h3 class="section-title">变异详情</h3><div class="details">${rows}</div></div>`;
    }

    function renderFarmEvent(event) {
      const badgeClass = event.mutantCount > 0 ? 'warn' : 'ok';
      const ownerName = event.isOwnFarm ? '我的农场' : escapeHtml(event.friendInfo?.name || '未知');
      resultEl.innerHTML = `<section class="panel">
        <div class="panel-head">
          <div class="panel-title">${event.isOwnFarm ? '我的农场' : '解析结果'}</div>
          <span class="badge ${badgeClass}">${event.mutantCount > 0 ? `发现 ${event.mutantCount} 个变异` : '解析成功'}</span>
        </div>
        <div class="summary">
          <div class="summary-card"><div class="label">${event.isOwnFarm ? '我的农场' : '好友'}</div><div class="value">${ownerName}</div></div>
          <div class="summary-card"><div class="label">土地数</div><div class="value">${event.landCount || 0}</div></div>
        </div>
        <div class="section">
          <h3 class="section-title">农场土地 (4x6)</h3>
          ${renderLandGrid(event)}
        </div>
        <div class="section"><div class="help">更新时间：${fmtTime(event.time)}</div></div>
      </section>`;
    }

    function addEvent(event) {
      if (!event || event.type === 'hello') return;
      if (event.id && seen.has(event.id)) return;
      if (event.id) seen.add(event.id);
      if (event.lands) {
        latestFarmEvent = event;
        renderFarmEvent(event);
      }
    }

    async function refreshStatus() {
      const res = await fetch('/api/status');
      const status = await res.json();
      const address = status.addresses && status.addresses[0] ? status.addresses[0] : '127.0.0.1';
      document.getElementById('httpAddr').textContent = `${address}:${status.httpPort}`;
      document.getElementById('proxyAddr').textContent = `${address}:${status.proxyPort}`;
      document.getElementById('connections').textContent = status.targetConnections;
      document.getElementById('frames').textContent = `${status.parsedFrames}/${status.totalFrames}`;
      if (latestFarmEvent && !latestFarmEvent.currentUser && status.currentUser) {
        latestFarmEvent.currentUser = status.currentUser;
        renderFarmEvent(latestFarmEvent);
      }
    }

    async function loadHistory() {
      const res = await fetch('/api/events');
      const events = await res.json();
      const farmEvents = events.filter(event => event.lands);
      if (farmEvents.length > 0) addEvent(farmEvents[0]);
    }

    const stream = new EventSource('/api/stream');
    stream.onmessage = message => {
      addEvent(JSON.parse(message.data));
      refreshStatus().catch(() => {});
    };

    function parseMarkdown(text) {
      return String(text || '')
        .replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/<li><\/li>/g, '')
        .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>')
        .replace(/^<\/p>/gm, '')
        .replace(/<p>$/gm, '')
        .replace(/<\/p><p>/g, '</p>\n<p>')
        .trim();
    }

    async function showHelp() {
      const modal = document.getElementById('helpModal');
      const content = document.getElementById('helpContent');
      modal.style.display = 'flex';
      try {
        const res = await fetch('/README.use.md');
        const mdText = await res.text();
        content.innerHTML = '<p>' + parseMarkdown(mdText) + '</p>';
      } catch {
        content.textContent = '加载帮助文档失败';
      }
    }

    function closeHelp() {
      const modal = document.getElementById('helpModal');
      modal.style.display = 'none';
      localStorage.setItem('helpShown', 'true');
    }

    async function loadExtraInfo() {
      try {
        const res = await fetch('/api/about', {
          method: 'GET',
          headers: {
            'Accept': 'text/plain',
            'Cache-Control': 'no-cache'
          }
        });
        if (!res.ok) {
          console.log('About info fetch failed:', res.status);
          return;
        }
        const text = await res.text();
        const trimmed = text.trim();
        console.log('About info loaded:', trimmed.length, 'chars');
        if (trimmed && trimmed.length > 0) {
          document.getElementById('extraContent').textContent = trimmed;
          document.getElementById('extraInfo').style.display = 'block';
        }
      } catch (err) {
        console.log('About info fetch error:', err.message);
      }
    }

    loadHistory().catch(() => {});
    refreshStatus().catch(() => {});
    loadExtraInfo().catch(() => {});
    setInterval(() => refreshStatus().catch(() => {}), 3000);

    if (!localStorage.getItem('helpShown')) {
      localStorage.setItem('helpShown', 'true');
      setTimeout(() => showHelp(), 800);
    }

    function resetHelp() {
      localStorage.removeItem('helpShown');
      alert('下次刷新页面将重新显示使用说明');
    }
  </script>
</body>
</html>
